<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tailwind 基礎：旅遊網站 Hero</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 font-sans">

    <!-- Section: Colors, Text, Spacing -->
    <section class="bg-emerald-600 text-emerald-50 p-16 text-center">
        <h1 class="text-4xl font-extrabold mb-4 tracking-tight">
            探索未知的世界
        </h1>

        <p class="text-emerald-100 mb-8 max-w-md mx-auto">
            尋找您的下一個冒險目的地，開啟難忘的旅程。
        </p>

        <a href="#"
           class="bg-white text-emerald-700 px-8 py-3 rounded-full font-bold
                  hover:bg-emerald-50 transition-all duration-300 shadow-lg active:scale-95">
            立即開始
        </a>
    </section>

    <div class="max-w-4xl mx-auto p-8">
        <h2 class="text-2xl font-semibold text-gray-800 mb-6">本單元觀念</h2>

        <ul class="space-y-4">

            <li class="flex items-start">
                <span class="bg-green-100 text-green-800 px-2 py-1 rounded text-sm font-mono mr-3">
                    bg-emerald-600
                </span>
                <span>背景顏色：祖母綠主題</span>
            </li>

            <li class="flex items-start">
                <span class="bg-green-100 text-green-800 px-2 py-1 rounded text-sm font-mono mr-3">
                    text-4xl
                </span>
                <span>字體大小：大型標題</span>
            </li>

            <li class="flex items-start">
                <span class="bg-green-100 text-green-800 px-2 py-1 rounded text-sm font-mono mr-3">
                    p-16
                </span>
                <span>內距加大，提升視覺空間感</span>
            </li>

            <li class="flex items-start">
                <span class="bg-green-100 text-green-800 px-2 py-1 rounded text-sm font-mono mr-3">
                    max-w-md mx-auto
                </span>
                <span>限制文字寬度並置中（提升可讀性）</span>
            </li>

        </ul>
    </div>

</body>

</html>
